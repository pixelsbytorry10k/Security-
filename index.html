<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A little gift for you</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #0f2027, #000, #ff4d6d);
  color: #fff;
}

/* ===== BIOMETRIC SCREEN ===== */
#biometric-screen {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  z-index: 10;
  position: absolute;
  width: 100%;
}

.container {
  text-align: center;
  background: rgba(0,0,0,0.6);
  padding: 50px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
}

h1 {
  color: #ff4d6d;
}

#bioBtn {
  padding: 18px 40px;
  border: none;
  border-radius: 15px;
  background-color: #ff4d6d;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 15px #ff4d6d;
}

#messageBox {
  margin-top: 20px;
  color: #ff4d6d;
}

/* ===== GIFT SCREEN ===== */
#gift-screen {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: #111;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ff4d6d;
  font-size: 2.5rem;
  opacity: 0;
  text-align: center;
}

#startButton {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- BIOMETRIC -->
<div id="biometric-screen">
  <div class="container">
    <h1>Biometric Login</h1>
    <button id="bioBtn">Set Up Biometrics</button>
    <div id="messageBox"></div>
  </div>
</div>

<!-- GIFT -->
<div id="gift-screen">
  <div id="message"></div>
  <div id="startButton"></div>
  <audio id="bgm" src="truecut.mp3"></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
const bioBtn = document.getElementById('bioBtn');
const messageBox = document.getElementById('messageBox');

function saveCredential(credential) {
  const id = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
  localStorage.setItem('fingerprintCredential', id);
  localStorage.setItem('biometricSet', 'true');
}

function getStoredCredential() {
  const id = localStorage.getItem('fingerprintCredential');
  return id ? Uint8Array.from(atob(id), c => c.charCodeAt(0)) : null;
}

function generateChallenge() {
  return new Uint8Array(32);
}

if(localStorage.getItem('biometricSet')) {
  bioBtn.textContent = "Login with Biometrics";
}

bioBtn.addEventListener('click', async () => {
  try {
    if(!localStorage.getItem('biometricSet')) {
      const publicKey = {
        challenge: generateChallenge(),
        rp: { name: "Demo Site" },
        user: {
          id: Uint8Array.from('demo_user', c => c.charCodeAt(0)),
          name: "demo_user",
          displayName: "Demo User"
        },
        pubKeyCredParams: [{ alg: -7, type: "public-key" }]
      };

      const credential = await navigator.credentials.create({ publicKey });
      saveCredential(credential);

      bioBtn.textContent = "Login with Biometrics";
      messageBox.textContent = "Setup successful!";
    } else {
      const storedId = getStoredCredential();

      await navigator.credentials.get({
        publicKey: {
          challenge: generateChallenge(),
          allowCredentials: [{ id: storedId, type: "public-key" }]
        }
      });

      messageBox.textContent = "Login successful!";

      setTimeout(() => {
        document.getElementById("biometric-screen").style.display = "none";
        document.getElementById("gift-screen").style.display = "block";
        initGift();
      }, 800);
    }
  } catch(err) {
    messageBox.textContent = "Error: " + err;
  }
});

/* ===== GIFT LOGIC ===== */
function initGift() {
const audio = document.getElementById('bgm');
const button = document.getElementById('startButton');

button.addEventListener('click', () => {
  audio.play();
  button.style.display = 'none';
  animate();
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("gift-screen").appendChild(renderer.domElement);

const particleMaterial = new THREE.PointsMaterial({color:0xff4d6d,size:0.5});
const particleCount = 2000;

const geo = new THREE.BufferGeometry();
const pos = new Float32Array(particleCount*3);

for(let i=0;i<particleCount;i++){
  pos[i*3]=(Math.random()-0.5)*100;
  pos[i*3+1]=0;
  pos[i*3+2]=(Math.random()-0.5)*100;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
const particles = new THREE.Points(geo, particleMaterial);
scene.add(particles);

function heart(t){
  return new THREE.Vector3(
    16*Math.pow(Math.sin(t),3),
    13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t),
    0
  );
}

const targets=[];
for(let i=0;i<particleCount;i++){
  targets.push(heart(Math.random()*Math.PI*2));
}


const messages = [
            "Hey Princess❤️‍🩹\nTap me!",
            "I made something small for you",
            "Just read this slowly… it’s for you.",
            "You know what I like about you?",
            "You're amazing\n🔥",
            "Being around you, even in my thoughts, makes everything better",
            "You always find a way to lift my mood… even when you don’t realize it",
            "You inspire me in ways I don’t even say out loud",
            "I will always be there for you no matter what",
            "I choose you\n🥰",
            "You're my peace",
            "My safe space",
            "You're Beautiful\n😘",
            "You're one in a billion",
            "And yeah…",
            " I\nLove\nYou\n😘"
        ];
  
const msgEl = document.getElementById("message");

let i=0, opacity=0, state="in";

function animate(){
  requestAnimationFrame(animate);

  const arr = particles.geometry.attributes.position.array;

  for(let j=0;j<particleCount;j++){
    arr[j*3]+= (targets[j].x-arr[j*3])*0.02;
    arr[j*3+1]+= (targets[j].y-arr[j*3+1])*0.02;
  }

  particles.geometry.attributes.position.needsUpdate = true;
  scene.rotation.y += 0.003;

  if(state==="in"){
    opacity+=0.01;
    if(opacity>=1){opacity=1; state="hold"; setTimeout(()=>state="out",2000);}
  } else if(state==="out"){
    opacity-=0.01;
    if(opacity<=0){
      i=(i+1)%messages.length;
      msgEl.innerText=messages[i];
      state="in";
    }
  }

  msgEl.style.opacity = opacity;

  renderer.render(scene,camera);
}
}
</script>

</body>
</html>
