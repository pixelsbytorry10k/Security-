<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biometric Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    margin: 0;
    color: #fff;
  }

  .container {
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
  }

  h1 {
    font-size: 2.5em;
    color: #ff4d6d;
    text-shadow: 0 0 5px #ff4d6d, 0 0 10px #ff4d6d, 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
    animation: flicker 1.5s infinite alternate;
    margin-bottom: 40px;
  }

  @keyframes flicker {
    0% { opacity: 1; text-shadow: 0 0 5px #ff4d6d, 0 0 10px #ff4d6d; }
    50% { opacity: 0.8; text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d; }
    100% { opacity: 1; text-shadow: 0 0 5px #ff4d6d, 0 0 10px #ff4d6d; }
  }

  /* Biometric button */
  #bioBtn {
    position: relative;
    padding: 18px 40px 18px 60px;
    border: none;
    border-radius: 15px;
    background-color: #ff4d6d;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 15px #ff4d6d;
    transition: 0.3s;
    overflow: hidden;
  }

  #bioBtn:hover {
    box-shadow: 0 0 30px #ff4d6d;
  }

  /* Fingerprint icon */
  #bioBtn::before {
    content: "🔒";
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 24px;
    animation: pulse 1.5s infinite alternate;
  }

  @keyframes pulse {
    0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff4d6d; transform: translateY(-50%) scale(1); }
    50% { text-shadow: 0 0 15px #fff, 0 0 25px #ff4d6d; transform: translateY(-50%) scale(1.1); }
    100% { text-shadow: 0 0 5px #fff, 0 0 10px #ff4d6d; transform: translateY(-50%) scale(1); }
  }

  #message {
    margin-top: 25px;
    font-size: 1.2em;
    color: #ff4d6d;
    text-shadow: 0 0 5px #ff4d6d, 0 0 10px #ff4d6d, 0 0 15px #ff4d6d;
    transition: 0.3s;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Biometric Login</h1>
    <button id="bioBtn">Set Up Biometrics</button>
    <div id="message"></div>
  </div>

<script>
const message = document.getElementById('message');
const bioBtn = document.getElementById('bioBtn');

// Use localStorage to simulate server storage
function saveCredential(credential) {
  const id = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
  localStorage.setItem('fingerprintCredential', id);
  localStorage.setItem('biometricSet', 'true');
}

function getStoredCredential() {
  const id = localStorage.getItem('fingerprintCredential');
  return id ? Uint8Array.from(atob(id), c => c.charCodeAt(0)) : null;
}

// Random challenge for WebAuthn
function generateChallenge() {
  return new Uint8Array(32);
}

// Update button text if biometric already set
if(localStorage.getItem('biometricSet')) {
  bioBtn.textContent = "Login with Biometrics";
}

// ----- Button Click -----
bioBtn.addEventListener('click', async () => {
  try {
    if(!localStorage.getItem('biometricSet')) {
      // Register biometric
      const publicKey = {
        challenge: generateChallenge(),
        rp: { name: "Demo Site" },
        user: {
          id: Uint8Array.from('demo_user', c => c.charCodeAt(0)),
          name: "demo_user",
          displayName: "Demo User"
        },
        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
        timeout: 60000,
        attestation: "direct"
      };
      const credential = await navigator.credentials.create({ publicKey });
      saveCredential(credential);
      bioBtn.textContent = "Login with Biometrics";
      message.textContent = "Biometric setup successful!";
    } else {
      // Login
      const storedId = getStoredCredential();
      if(!storedId) {
        message.textContent = "Error: No biometric found.";
        return;
      }
      const publicKey = {
        challenge: generateChallenge(),
        allowCredentials: [{ id: storedId, type: "public-key" }],
        timeout: 60000
      };
      await navigator.credentials.get({ publicKey });
      message.textContent = "Login successful!";
      setTimeout(() => {
        window.location.href = "gift.html";
      }, 800);
    }
  } catch(err) {
    message.textContent = `Error: ${err}`;
  }
});
</script>
</body>
</html>
